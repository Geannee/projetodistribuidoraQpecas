<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Pagamento – Quero Peças</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --bg: #F3F4F6;
      --card-bg: #FFFFFF;
      --text-dark: #1F2937;
      --text-gray: #4B5563;
      --border: #E5E7EB;
      --success: #10B981;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .payment-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      text-align: center;
    }
    .payment-header h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .payment-header p {
      font-size: 14px;
      color: var(--text-gray);
      margin-bottom: 24px;
    }
    .order-summary {
      background: #F9FAFB;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .summary-row:last-child {
      margin-bottom: 0;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 8px;
      font-weight: 700;
    }
    .method-select {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .method-option {
      border: 2.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card-bg);
    }
    .method-option.selected {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(37, 99, 235, 0.05);
    }
    .btn-pay {
      background: var(--primary);
      color: white;
      border: none;
      width: 100%;
      height: 48px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-pay:hover {
      background: var(--primary-hover);
    }
    .success-screen {
      display: none;
    }
    .success-icon {
      font-size: 48px;
      color: var(--success);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="payment-container" id="payment-box">
  <div class="payment-flow" id="flow-payment">
    <div class="payment-header">
      <h1>Quero Peças Pay</h1>
      <p>Simulador de pagamento integrado</p>
    </div>

    <div class="order-summary">
      <div class="summary-row">
        <span>Pedido:</span>
        <span id="order-number">QP-XXXXXX</span>
      </div>
      <div class="summary-row">
        <span>Total:</span>
        <span id="order-value">R$ 0,00</span>
      </div>
    </div>

    <label style="display:block; text-align:left; font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text-gray);">
      Escolha o método de pagamento
    </label>
    <div class="method-select">
      <div class="method-option selected" data-method="PIX">Pix</div>
      <div class="method-option" data-method="CARTAO">Cartão</div>
      <div class="method-option" data-method="BOLETO">Boleto</div>
    </div>

    <button class="btn-pay" onclick="processPayment()">Confirmar Pagamento</button>
  </div>

  <div class="success-screen" id="flow-success">
    <div class="success-icon">✓</div>
    <h2>Pagamento Aprovado!</h2>
    <p style="color:var(--text-gray); font-size:14px; margin-bottom:24px;">
      O pagamento do pedido <strong id="success-order-num">-</strong> foi simulado e processado com sucesso.
    </p>
    <button class="btn-pay" style="background:var(--success);" onclick="window.close()">Fechar Janela</button>
  </div>
</div>

<script>
  let methodSelected = 'PIX';
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('id');

  // Fetch order details
  async function loadOrderDetails() {
    if (!orderId) {
      alert('ID do pedido não informado.');
      return;
    }
    try {
      // Find order in database. Since we don't have a direct GET /pedidos/{id} (we have it but let's see)
      // Wait, we can fetch all orders and find ours, or get it from history.
      // Or we can add a quick GET /pedidos/{id} in the backend or we can get it from history
      // Wait! We can call GET /pedidos, which returns all orders, and filter by id!
      // This is extremely simple and already exists.
      const token = sessionStorage.getItem('qp_token');
      const response = await fetch('http://localhost:8080/pedidos', {
        headers: {
          'Authorization': token ? `Bearer ${token}` : ''
        }
      });
      if (response.ok) {
        const orders = await response.json();
        const order = orders.find(o => o.idPedido == orderId);
        if (order) {
          document.getElementById('order-number').textContent = order.numeroPedido;
          document.getElementById('order-value').textContent = 'R$ ' + order.valorTotal.toFixed(2).replace('.', ',');
          return;
        }
      }
      alert('Pedido não localizado.');
    } catch (e) {
      console.error(e);
    }
  }

  // Setup method selection
  document.querySelectorAll('.method-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.method-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      methodSelected = opt.dataset.method;
    });
  });

  async function processPayment() {
    const token = sessionStorage.getItem('qp_token');
    try {
      const response = await fetch(`http://localhost:8080/pedidos/${orderId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': token ? `Bearer ${token}` : ''
        },
        body: JSON.stringify({
          metodoPagamento: methodSelected,
          statusPagamento: 'PAGO'
        })
      });

      if (response.ok) {
        const order = await response.json();
        
        // Add a real-time notification to localStorage
        const notification = {
          id: Date.now(),
          titulo: "Pagamento Confirmado",
          mensagem: `O pagamento do pedido ${order.numeroPedido} foi recebido com sucesso!`,
          data: new Date().toLocaleString('pt-BR'),
          lida: false
        };
        const currentNotifs = JSON.parse(localStorage.getItem('qp_notificacoes') || '[]');
        currentNotifs.unshift(notification);
        localStorage.setItem('qp_notificacoes', JSON.stringify(currentNotifs));

        // Trigger change event to notify other tabs
        localStorage.setItem('qp_notif_trigger', Date.now());

        document.getElementById('success-order-num').textContent = order.numeroPedido;
        document.getElementById('flow-payment').style.display = 'none';
        document.getElementById('flow-success').style.display = 'block';
      } else {
        alert('Erro ao processar o pagamento.');
      }
    } catch (e) {
      console.error(e);
      alert('Erro de conexão ao simular pagamento.');
    }
  }

  window.onload = loadOrderDetails;
</script>
</body>
</html>
